<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EM Launchpad — Render</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #06080c; overflow: hidden; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx?v=2"></script>
<script type="text/babel" src="reveal.jsx?v=2"></script>
<script type="text/babel">
  const { useState, useEffect, useMemo } = React;
  const DUR = 6, W = 1920, H = 1080;
  const TL = window.TimelineContext;

  function ExportStage() {
    const [time, setTime] = useState(0);
    const [scale, setScale] = useState(1);

    useEffect(() => {
      const m = () => setScale(Math.max(window.innerWidth / W, window.innerHeight / H));
      m();
      window.addEventListener('resize', m);
      return () => window.removeEventListener('resize', m);
    }, []);

    useEffect(() => {
      window.__seekTo = (t) => setTime(Math.max(0, Math.min(DUR, t)));
      window.__duration = DUR;
    }, []);

    const ctx = useMemo(() => ({ time, duration: DUR, playing: false, setTime, setPlaying: () => {} }), [time]);

    return (
      <div style={{ position: 'fixed', inset: 0, background: '#06080c', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ width: W, height: H, transform: `scale(${scale})`, transformOrigin: 'center', position: 'relative', background: '#06080c', overflow: 'hidden' }}>
          <TL.Provider value={ctx}>
            <LaunchpadReveal />
          </TL.Provider>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<ExportStage />);
</script>
</body>
</html>
